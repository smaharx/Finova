version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: finova
      POSTGRES_PASSWORD: finova_pass
      POSTGRES_DB: finova
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finova"]
      interval: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://finova:finova_pass@db:5432/finova
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped

volumes:
  postgres_data:
